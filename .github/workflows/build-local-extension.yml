name: Build local Zed extension

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Build extension component
        run: cargo component build --release --target wasm32-wasip1

      - name: Package local extension
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ctags
          wasm_file=$(find target/wasm32-wasip1/release -maxdepth 1 -name 'zed_ctags*.wasm' -print -quit)
          if [[ -z "$wasm_file" ]]; then
            echo "Could not find built zed_ctags wasm component" >&2
            find target -name '*.wasm' -print >&2
            exit 1
          fi
          cp extension.toml dist/ctags/extension.toml
          cp "$wasm_file" dist/ctags/extension.wasm
          cat > dist/ctags/install.ps1 <<'SCRIPT'
          $ErrorActionPreference = "Stop"
          $target = Join-Path $env:LOCALAPPDATA "Zed\extensions\installed\ctags"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          Copy-Item -LiteralPath (Join-Path $PSScriptRoot "extension.toml") -Destination $target -Force
          Copy-Item -LiteralPath (Join-Path $PSScriptRoot "extension.wasm") -Destination $target -Force
          Write-Host "Installed ctags Zed extension to $target"
          Write-Host "Restart Zed after installation."
          SCRIPT

      - name: Upload local extension
        uses: actions/upload-artifact@v4
        with:
          name: zed-ctags-local-extension
          path: dist/ctags
          if-no-files-found: error